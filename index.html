<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/styles.css">
    <script src="js/main.js" defer></script>
    <title>mini-game-dom</title>
</head>
<body>
    <header>
        <h1>Combat</h1>
    </header>
    <main>
        <section id="arena">
            <div class="characters">
                <img src="assets/images/chara2/Idle.png" alt="user character" class="user sprite">
                <img src="assets/images/boss1/Scream.png" alt="pc character" class="pc sprite flip">
            </div>
        </section>

        <section id="controls">
            <button class="btn-attack">Attack</button>
        </section>

        <section id="jornal">
            <h2>Fighting jornal</h2>
            <div class="jornal-log"></div>
        </section>
    </main>
</body>
</html>
