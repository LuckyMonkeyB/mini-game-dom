<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <!-- Bungee font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    
    <!-- Noto Serif JP font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles/styles.css">
    <script src="js/main.js" defer></script>
    <title>mini-game-dom</title>
</head>
<body>
    <header>
        <h1>Iaijustsu strike</h1>
    </header>
    <main>
        <section id="arena">
            <div class="hp-bars-container">
                <div class="health-container player-hp-container">
                    <div class="name">PLAYER</div>
                    <div class="health-bar">
                        <div class="player-hp-fill hp-fill"></div>
                    </div>
                </div>
                
                <div class="health-container pc-hp-container">
                    <div class="name">BOSS</div>
                    <div class="health-bar">
                        <div class="pc-hp-fill hp-fill"></div>
                    </div>
                </div>
            </div>
            
            <div class="game-message hidden"></div>
            
            <div class="characters">
                <img src="assets/images/chara2/Idle.png" alt="player character" class="player sprite">
                <img src="assets/images/boss1/Scream.png" alt="pc character" class="pc sprite flip">
            </div>

            <button class="btn-attack">Attack</button>
        </section>
        
        <section id="jornal">
            <h3>Fighting jornal</h3>
            <div class="jornal-log"></div>
        </section>
    </main>
</body>
</html>
